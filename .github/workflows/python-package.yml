# This workflow will install Python dependencies, run tests and lint with a variety of Python versions# 此工作流将安装 Python 依赖项，使用多种 Python 版本运行测试并进行代码检查
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python# 有关更多信息，请参阅：https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package名称: Python软件包

on:触发条件:
  push:
    branches: [ "main" ]
  pull_request:拉取请求:
    branches: [ "main" ]

jobs:作业:
  build:构建:

    runs-on: ubuntu-latest运行环境: ubuntu-latest
    strategy:策略:
      fail-fast: false快速失败: 否
      matrix:矩阵:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        pytest
