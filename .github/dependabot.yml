    runs-on运行环境: ubuntu-latest运行环境: ubuntu-latest
    steps步骤:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"      - 运行: echo" 此作业现已在 GitHub 托管的 ${{ runner.os }} 服务器上运行！"
      - run: echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."      - run: echo" 您的分支名称是 ${{ github.ref }}，您的仓库是 ${{ github.repository }}。"
      - name: Check out repository code      - name: 检出仓库代码
        uses使用: actions/checkout@v6使用: actions/checkout@v6
      - run: echo "💡 The ${{ github.repository }} repository has been cloned to the runner."      - run: echo" 已将 ${{ github.repository }} 仓库克隆到运行器上。"
      - run: echo "🖥️ The workflow is now ready to test your code on the runner."      - run: echo"️ 工作流现已准备好在运行器上测试您的代码。"
      - name: List files in the repository      - 名称: 列出仓库中的文件
        run运行: |运行: |
          ls ${{ github.workspace }}
      - run: echo "🍏 This job's status is ${{ job.status }}."
