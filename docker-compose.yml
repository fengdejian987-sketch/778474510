version: '3.8'版本: '3.8'

services:服务:
  # PostgreSQL 数据库
  database:数据库数据库：数据库数据库：数据库数据库：数据库数据库：数据库数据库：数据库数据库：数据库数据库：数据库:
    image: postgres:15-alpine镜像: postgres:15-alpine
    container_name: formula_db容器名称: formula_db
    environment:环境环境环境：环境环境:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-formula_db}
    volumes:卷:卷:卷:卷:卷卷：卷：卷：卷：卷：卷卷：卷：卷：卷：卷：卷卷：卷：卷：卷：卷：卷卷：卷：卷：卷：卷：卷卷：卷：卷：卷：卷：卷卷：卷：卷：卷：卷：卷卷：卷：卷：卷：卷：卷:
      - postgres_data:/var/lib/postgresql/data
    ports:端口端口:端口端口:端口端口:
      - "${DB_PORT:-5432}:5432"
    healthcheck:健康检查健康检查:健康检查健康检查:健康检查:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s间隔: 10秒间隔: 10秒
      timeout: 超时: 5s5秒
      retries: 5重试次数: 5
    networks:
      - formula_network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: formula_redis
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:健康检查健康检查:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s间隔: 10秒
      timeout: 5s超时: 5秒
      retries: 5重试次数: 5
    networks:
      - formula_network

  # 免客业 API 服务
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: formula_api
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-True}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-formula_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_DEBUG: ${API_DEBUG:-True}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
      - ./data:/app/data
    ports:
      - "${API_PORT:-8000}:8000"
    networks:
      - formula_network

  # 可选: Jupyter Notebook 用于数据探索
  notebook:
    image: jupyter/scipy-notebook:latest
    container_name: formula_notebook
    depends_on:
      - api
    environment:
      JUPYTER_ENABLE_LAB: "yes"
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data:/home/jovyan/data
    ports:
      - "8888:8888"
    networks:
      - formula_network
    command: start-notebook.sh --NotebookApp.token='' --NotebookApp.password=''

  # 可选: pgAdmin 数据库管理
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: formula_pgadmin
    depends_on:
      - database
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - formula_network

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

networks:
  formula_network:
    driver: bridge
